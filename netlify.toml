# Security headers — planexecuteachieve.com
# CSP is tuned to what the site actually loads:
#   - React/ReactDOM (pinned 18.3.1) from unpkg.com
#   - Site scripts from assets/js/ ('self')
#   - Google Fonts (fonts.googleapis.com CSS + fonts.gstatic.com files)
#   - 'unsafe-inline' applies to styles only (inline style attributes/tags);
#     scripts are fully external — no unsafe-inline or unsafe-eval needed.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://docs.google.com"
