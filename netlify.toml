# Security headers — planexecuteachieve.com
# CSP is tuned to what the site actually loads:
#   - React/ReactDOM/Babel from unpkg.com
#   - Google Fonts (fonts.googleapis.com CSS + fonts.gstatic.com files)
#   - Inline <script> and inline styles ('unsafe-inline')
#   - 'unsafe-eval' is required by Babel standalone (in-browser JSX transform).
#     Pre-compiling the JSX at build time would let you remove both
#     'unsafe-eval' and the unpkg dependency — and speed up page load.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://docs.google.com"
