<style>
  :root {
    --navy-deep: #0A1628;
    --navy: #00356B;
    --navy-panel: #0F2441;
    --navy-line: rgba(255,255,255,0.08);
    --navy-line-strong: rgba(255,255,255,0.14);
    --mint: #4CAF8C;
    --mint-dim: rgba(76, 175, 140, 0.12);
    --seafoam: #3D9970;
    --bright-blue: #2979C5;
    --white: #FFFFFF;
    --soft-gray: #B0BEC5;
    --slate: #8898AE;
    --slate-dim: #5A6B83;
    --amber: #F4A261;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    background: var(--navy-deep);
    color: var(--white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  .serif, .display {
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .mono {
    font-family: 'Azeret Mono', ui-monospace, monospace;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  button, input, textarea { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  /* ───────── container ───────── */
  .wrap {
    max-width: 1240px;
    margin: 0 auto;
    padding: 0 48px;
  }
  @media (max-width: 720px) {
    .wrap { padding: 0 24px; }
  }

  /* ───────── nav ───────── */
  .nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10, 22, 40, 0.72);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--navy-line);
  }
  .nav-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 0;
  }
  .nav-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    border-radius: 6px;
  }
  .nav-brand:focus-visible {
    outline: 2px solid var(--mint);
    outline-offset: 4px;
  }
  .nav-mark {
    font-family: 'Azeret Mono', monospace;
    font-weight: 500;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: var(--white);
  }
  .nav-mark .x { color: var(--mint); font-size: 1.15em; font-weight: 600; }
  .nav-divider {
    height: 14px;
    width: 1px;
    background: var(--navy-line-strong);
  }
  .nav-name {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 20px;
    letter-spacing: -0.01em;
    color: var(--white);
    font-weight: 400;
  }
  .nav-name em { color: var(--mint); font-style: normal; font-weight: 800; }
  .nav-name .tm {
    font-family: 'Azeret Mono', monospace;
    font-size: 0.7em;
    vertical-align: super;
    letter-spacing: 0;
    color: var(--white);
    margin-left: 3px;
    font-weight: 400;
  }
  @media (max-width: 720px) {
    .nav-divider { display: none; }
    .nav-name { font-size: 17px; }
  }
  .nav-links {
    display: flex;
    gap: 32px;
    font-size: 13px;
    color: var(--soft-gray);
    font-weight: 500;
  }
  .nav-links a { transition: color 180ms ease; cursor: pointer; border-radius: 4px; }
  .nav-links a:hover { color: var(--mint); }
  .nav-links a.is-active { color: var(--white); }
  .nav-links a:focus-visible {
    outline: 2px solid var(--mint);
    outline-offset: 4px;
    color: var(--mint);
  }

  /* ───────── mobile nav (CTA + hamburger + dropdown) ───────── */
  .nav-mobile { display: none; align-items: center; gap: 12px; }
  .nav-toggle {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    border: 1px solid var(--navy-line-strong);
    border-radius: 8px;
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex: none;
    transition: border-color 180ms ease;
  }
  .nav-toggle:hover { border-color: var(--mint); }
  .nav-toggle:focus-visible {
    outline: 2px solid var(--mint);
    outline-offset: 3px;
  }
  .nav-toggle-bars {
    position: relative;
    width: 18px;
    height: 13px;
    display: block;
  }
  .nav-toggle-bars span {
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    border-radius: 2px;
    background: var(--white);
    transition: transform 220ms ease, opacity 180ms ease, top 220ms ease;
  }
  .nav-toggle-bars span:nth-child(1) { top: 0; }
  .nav-toggle-bars span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  .nav-toggle-bars span:nth-child(3) { top: 100%; transform: translateY(-100%); }
  .nav-toggle.is-open .nav-toggle-bars span:nth-child(1) {
    top: 50%;
    transform: translateY(-50%) rotate(45deg);
  }
  .nav-toggle.is-open .nav-toggle-bars span:nth-child(2) { opacity: 0; }
  .nav-toggle.is-open .nav-toggle-bars span:nth-child(3) {
    top: 50%;
    transform: translateY(-50%) rotate(-45deg);
  }
  .nav-menu { display: none; }
  .nav-menu.is-open {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 12px 0 16px;
    border-top: 1px solid var(--navy-line);
    margin-top: 6px;
  }
  .nav-menu a {
    font-size: 15px;
    font-weight: 500;
    color: var(--soft-gray);
    padding: 12px 10px;
    border-radius: 6px;
    transition: color 180ms ease, background 180ms ease;
  }
  .nav-menu a:hover { color: var(--mint); background: rgba(255,255,255,0.03); }
  .nav-menu a:focus-visible {
    outline: 2px solid var(--mint);
    outline-offset: -2px;
    color: var(--mint);
  }
  @media (max-width: 720px) {
    .nav-mobile { display: flex; }
  }
  @media (max-width: 720px) {
    .nav-links { display: none; }
  }

  /* ───────── hero ───────── */
  .hero {
    position: relative;
    padding: 120px 0 140px;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 30%;
    left: -15%;
    width: 820px;
    height: 820px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(76,175,140,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
    z-index: 0;
  }
  .hero-content { position: relative; z-index: 1; }
  .eyebrow-text {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--soft-gray);
    font-weight: 500;
  }
  .hero-headline {
    font-size: clamp(3rem, 8vw + 0.5rem, 5.5rem);
    font-weight: 800;
    line-height: 0.95;
    color: var(--white);
    margin: 0 0 36px;
    max-width: 16ch;
    letter-spacing: -0.03em;
    text-wrap: balance;
  }
  .hero-headline em {
    color: var(--mint);
    font-style: normal;
  }
  .hero-sub {
    font-size: clamp(1.0625rem, 1.4vw, 1.1875rem);
    line-height: 1.55;
    color: var(--soft-gray);
    max-width: 520px;
    margin: 0 0 32px;
    font-weight: 400;
  }
  .cta-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    border-radius: 3px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    transition: all 180ms cubic-bezier(0.4, 0, 0.2, 1);
    border: 1.5px solid transparent;
    text-decoration: none;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--mint);
    color: var(--navy);
    border-color: var(--mint);
  }
  .btn-primary:hover {
    background: var(--seafoam);
    border-color: var(--seafoam);
    transform: translateY(-2px);
  }
  .btn-ghost {
    background: transparent;
    color: var(--white);
    border-color: rgba(255,255,255,0.3);
    padding: 12.5px 22px;
  }
  .btn-ghost:hover {
    border-color: var(--white);
    background: rgba(255,255,255,0.04);
  }
  .btn .arrow { transition: transform 180ms ease; }
  .btn:hover .arrow { transform: translateX(3px); }

  /* ───────── hero layout: single column ───────── */
  .hero-single {
    max-width: 820px;
  }

  /* ───────── research protocol panel ───────── */
  .protocol {
    margin-top: 18px;
    border: 1px solid var(--navy-line-strong);
    background: linear-gradient(180deg, rgba(15,36,65,0.55) 0%, rgba(10,22,40,0.35) 100%);
    backdrop-filter: blur(2px);
    position: relative;
  }
  /* corner registration ticks */
  .protocol::before,
  .protocol::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border: 1px solid var(--mint);
    opacity: 0.7;
  }
  .protocol::before { top: -5px; left: -5px; border-right: none; border-bottom: none; }
  .protocol::after { bottom: -5px; right: -5px; border-left: none; border-top: none; }

  .protocol-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    border-bottom: 1px solid var(--navy-line);
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .protocol-head .badge-version {
    color: var(--mint);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .protocol-head .badge-version .dot {
    width: 6px;
    height: 6px;
    background: var(--mint);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(76,175,140,0.18);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 3px rgba(76,175,140,0.18); }
    50%      { box-shadow: 0 0 0 5px rgba(76,175,140,0.05); }
  }
  .protocol-head .badge-phase {
    color: var(--slate);
  }

  .protocol-rows {
    padding: 8px 0;
  }
  .protocol-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px dashed var(--navy-line);
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .protocol-row:last-child { border-bottom: none; }
  .protocol-row .pr-num {
    color: var(--slate-dim);
    font-size: 10px;
    letter-spacing: 0.14em;
  }
  .protocol-row .pr-label {
    color: var(--white);
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: normal;
    font-size: 17px;
    letter-spacing: -0.01em;
    text-transform: none;
  }
  .protocol-row .pr-state {
    color: var(--mint);
    font-size: 10px;
    letter-spacing: 0.2em;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .protocol-row .pr-state .tick {
    width: 4px;
    height: 4px;
    background: var(--mint);
    border-radius: 50%;
  }
  .protocol-row .pr-state.is-calibrating { color: var(--amber); }
  .protocol-row .pr-state.is-calibrating .tick { background: var(--amber); }
  .protocol-row .pr-state.is-open { color: var(--slate); }
  .protocol-row .pr-state.is-open .tick { background: var(--slate); border-radius: 0; }

  .protocol-foot {
    border-top: 1px solid var(--navy-line);
    padding: 14px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    font-family: 'Azeret Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--slate);
  }
  .protocol-foot .label { color: var(--slate-dim); display: block; margin-bottom: 4px; font-size: 9px; letter-spacing: 0.22em; }
  .protocol-foot .val { color: var(--soft-gray); }

  .hero-tagline {
    margin-top: 28px;
    padding-left: 20px;
    border-left: 1px solid var(--mint);
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mint);
    font-weight: 500;
  }
  .hero-tagline .sep { color: var(--slate-dim); margin: 0 12px; }

  @media (max-width: 960px) {
  }
  @media (max-width: 720px) {
    .hero { padding: 80px 0 100px; }
    .protocol-head { padding: 12px 16px; }
    .protocol-row { padding: 14px 16px; grid-template-columns: 24px 1fr auto; gap: 12px; }
    .protocol-row .pr-label { font-size: 16px; }
    .protocol-foot { padding: 12px 16px; grid-template-columns: 1fr; gap: 10px; }
  }

  /* ───────── section scaffold ───────── */
  .section {
    padding: 120px 0;
    position: relative;
    scroll-margin-top: 64px;
  }
  .section + .section { border-top: 1px solid var(--navy-line); }
  .section-panel {
    background: var(--navy-panel);
    border-top: 1px solid var(--navy-line);
    border-bottom: 1px solid var(--navy-line);
  }
  .section-head { margin-bottom: 64px; max-width: 820px; }
  .section-title {
    font-size: clamp(2rem, 4.5vw, 3.5rem);
    line-height: 1.1;
    color: var(--white);
    margin: 0;
  }
  .section-title em { color: var(--mint); font-style: normal; font-weight: 800; }
  .section-lede {
    font-family: 'Source Sans 3', system-ui, sans-serif;
    font-size: 18px;
    line-height: 1.55;
    color: var(--soft-gray);
    margin: 24px 0 0;
    max-width: 680px;
    text-wrap: pretty;
  }
  @media (max-width: 720px) {
    .section { padding: 80px 0; }
    .section-head { margin-bottom: 40px; }
  }

  /* ───────── premise intro (with supporting visual) ───────── */
  .premise-intro {
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr);
    gap: 56px;
    align-items: center;
    margin-bottom: 64px;
  }
  .premise-intro .section-head { margin-bottom: 0; }
  .premise-visual {
    position: relative;
    width: 100%;
    aspect-ratio: 2 / 1;
    overflow: hidden;
    border-radius: 2px;
  }
  .premise-visual img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  /* gentle fade into the panel background on the left edge so the image doesn't read as a heavy card */
  .premise-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, var(--navy-panel) 0%, rgba(15,36,65,0) 22%, rgba(15,36,65,0) 100%);
  }
  @media (max-width: 880px) {
    .premise-intro {
      grid-template-columns: 1fr;
      gap: 40px;
      margin-bottom: 48px;
    }
    .premise-visual { aspect-ratio: 2 / 1; }
  }

  /* ───────── manifesto ───────── */
  .manifesto-lede {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: clamp(2.5rem, 5.5vw, 4.5rem);
    font-weight: 800;
    line-height: 1.05;
    color: var(--white);
    margin: 0 0 40px;
    text-align: center;
    letter-spacing: -0.025em;
    text-wrap: balance;
  }
  .manifesto-lede em { color: var(--mint); font-style: normal; }
  .manifesto-lines {
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 580px;
    margin: 0 auto;
    text-align: center;
  }
  .manifesto-line {
    font-size: 18px;
    line-height: 1.6;
    color: var(--soft-gray);
    font-weight: 400;
  }
  .manifesto-line strong { color: var(--white); font-weight: 500; }

  /* ───────── premise grid (horizontal rows) ───────── */
  .premise-grid {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--navy-line-strong);
  }
  .premise-cell {
    display: grid;
    grid-template-columns: minmax(200px, 0.35fr) 1fr;
    gap: 48px;
    padding: 48px 0;
    border-bottom: 1px solid var(--navy-line);
    align-items: baseline;
  }
  .premise-cell:last-child { border-bottom: none; }
  .premise-word {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: clamp(3rem, 5vw, 4.5rem);
    font-weight: 800;
    line-height: 0.9;
    color: var(--white);
    margin: 0;
    letter-spacing: -0.03em;
    position: relative;
  }
  .premise-word .dot { color: var(--mint); }
  .premise-num {
    position: absolute;
    top: -0.15em;
    left: -0.05em;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 8rem;
    font-weight: 800;
    line-height: 1;
    color: var(--white);
    opacity: 0.04;
    pointer-events: none;
    letter-spacing: -0.04em;
  }
  .premise-hook {
    font-size: 18px;
    line-height: 1.4;
    color: var(--white);
    font-weight: 600;
    margin: 0 0 16px;
    letter-spacing: -0.005em;
  }
  .premise-body {
    font-size: 16px;
    line-height: 1.6;
    color: var(--soft-gray);
    margin: 0;
    font-weight: 400;
  }
  @media (max-width: 880px) {
    .premise-cell { grid-template-columns: 1fr; gap: 20px; padding: 36px 0; }
    .premise-word { margin-bottom: 0; }
    .premise-num { font-size: 6rem; }
  }

  /* ───────── field tests grid ───────── */
  .ft-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    border-top: 1px solid var(--navy-line-strong);
    margin-top: 24px;
  }
  .ft-cell {
    padding: 44px 36px 48px 0;
    border-right: 1px solid var(--navy-line);
  }
  .ft-cell:last-child { border-right: none; }
  .ft-cell:not(:first-child) { padding-left: 36px; }
  .ft-gap {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: clamp(1.75rem, 2.5vw, 2.25rem);
    font-weight: 700;
    line-height: 1.1;
    color: var(--mint);
    margin: 0 0 16px;
    letter-spacing: -0.02em;
    display: block;
  }
  .ft-headline {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: clamp(1.125rem, 1.5vw, 1.25rem);
    font-weight: 700;
    line-height: 1.3;
    color: var(--white);
    margin: 0 0 20px;
    letter-spacing: -0.01em;
    text-wrap: pretty;
  }
  .ft-body {
    font-size: 16px;
    line-height: 1.6;
    color: var(--soft-gray);
    margin: 0;
    font-weight: 400;
  }
  .ft-footer {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--navy-line);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: clamp(1.125rem, 1.6vw, 1.375rem);
    line-height: 1.35;
    color: var(--soft-gray);
  }
  .ft-footer a {
    color: var(--mint);
    text-decoration: none;
    border-bottom: 1px solid rgba(76,175,140,0.35);
    padding-bottom: 2px;

  @media (prefers-reduced-motion: reduce) {

  }

  /* ───────── back to top ───────── */
  .back-to-top {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 40;
    width: 40px;
    height: 40px;

  /* ───────── skip link ───────── */
  .skip-link {

</style>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ───────────────────── shared pieces ─────────────────────

function Mark({ size = 20 }) {

// ───────────────────── nav ─────────────────────

function Nav({ surveyUrl }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [activeId, setActiveId] = useState(null);

  const scrollTo = (id) => (e) => {
    e.preventDefault();
    const target = document.getElementById(id);
    if (!target) return;
    setMenuOpen(false);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  };

  useEffect(() => {
    if (!menuOpen) return;
    const onKey = (e) => { if (e.key === 'Escape') setMenuOpen(false); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [menuOpen]);

  useEffect(() => {
    const ids = ['premise', 'fieldtests', 'research', 'speaking'];
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) setActiveId(entry.target.id);
      });
    }, { rootMargin: '-40% 0px -55% 0px' });
    ids.forEach((id) => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  const links = [
    { id: 'premise', label: 'The Premise' },
    { id: 'fieldtests', label: 'Field Tests' },
    { id: 'research', label: 'Research' },
    { id: 'speaking', label: 'Speaking' },
  ];

  return (
    <nav className="nav">
      <div className="wrap">
        <div className="nav-inner">
          <a href="#top" onClick={scrollTo('top')} className="nav-brand">
            <Mark />
            <span className="nav-divider" aria-hidden="true"></span>
            <span className="nav-name">Plan · Execute · Achieve<span className="tm">™</span></span>
          </a>
          <style>{`.nav-inner { padding: 14px 0; }`}</style>
          <div className="nav-links">
            {links.map((l) => (
              <a key={l.id} href={`#${l.id}`} onClick={scrollTo(l.id)} className={activeId === l.id ? 'is-active' : ''}>{l.label}</a>
            ))}
          </div>
          <div className="nav-mobile">
            <button
              type="button"
              className={`nav-toggle${menuOpen ? ' is-open' : ''}`}
              aria-expanded={menuOpen}
              aria-controls="nav-mobile-menu"
              aria-label={menuOpen ? 'Close navigation menu' : 'Open navigation menu'}
              onClick={() => setMenuOpen((v) => !v)}
            >
              <span className="nav-toggle-bars" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </div>
        </div>
        <div
          id="nav-mobile-menu"
          className={`nav-menu${menuOpen ? ' is-open' : ''}`}
          hidden={!menuOpen}
        >
          {links.map((l) => (
            <a key={l.id} href={`#${l.id}`} onClick={scrollTo(l.id)}>{l.label}</a>
          ))}
        </div>
      </div>
    </nav>
  );

function BackToTop() {
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const onScroll = () => setShown(window.scrollY > window.innerHeight);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const goTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });
  return (
    <button
      className={`back-to-top${shown ? ' is-shown' : ''}`}
      onClick={goTop}
      aria-label="Back to top"
    >
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 13V3M8 3L3 8M8 3l5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </button>
  );
}

}

<script>
(function () {
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (!entry.isIntersecting) return;
      var el = entry.target;

      if (el.dataset.stagger) {
        var children = el.querySelectorAll(el.dataset.stagger);
        children.forEach(function (child, i) {
          child.style.animationDelay = (i * 120) + 'ms';
          child.classList.add('is-visible');
        });
      } else {
        el.classList.add('is-visible');
      }

      observer.unobserve(el);
    });
  }, { threshold: 0.15 });

  function setup() {
    var manifesto = document.querySelector('.manifesto-section');
    if (!manifesto) { setTimeout(setup, 100); return; }

    document.querySelectorAll('.manifesto-section, .research-card').forEach(function (el) {
      observer.observe(el);
    });

    document.querySelectorAll('.premise-cell').forEach(function (cell, i) {
      var delay = i * 700;
      var cellObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (!entry.isIntersecting) return;
          setTimeout(function () {
            entry.target.classList.add('is-visible');
          }, delay);
          cellObserver.unobserve(entry.target);
        });
      }, { threshold: 0.15 });
      cellObserver.observe(cell);
    });

    var ftGrid = document.querySelector('.ft-grid');
    if (ftGrid) {
      ftGrid.dataset.stagger = '.ft-cell';
      observer.observe(ftGrid);
    }
  }
  setup();
})();
</script>
